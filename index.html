
   !DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homenagem Dia das Mulheres - Inspiração</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.3) 100%), 
                        url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: calc(100vh - 120px);
        }

        .quote-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .quote-box::before,
        .quote-box::after {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 3px;
            background-color: #a01010;
        }

        .quote-box::before {
            top: 25px;
        }

        .quote-box::after {
            bottom: 25px;
        }

        .quote-text {
            font-size: 1.85rem;
            line-height: 1.5;
            font-weight: 300;
            color: #2a2a2a;
            margin: 30px 0;
            letter-spacing: 0.5px;
        }

        footer {
            background-color: #0a0a0a;
            padding: 25px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .copyright {
            font-size: 0.95rem;
            color: #d0d0d0;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            font-weight: 300;
        }

        .tagline {
            font-size: 0.85rem;
            color: #999;
            letter-spacing: 0.2px;
        }

        @media (max-width: 768px) {
            .quote-box {
                padding: 40px 30px;
                border-radius: 15px;
            }

            .quote-text {
                font-size: 1.5rem;
                line-height: 1.4;
            }

            .quote-box::before,
            .quote-box::after {
                width: 35px;
                height: 2px;
            }
        }

        @media (max-width: 480px) {
            .quote-box {
                padding: 30px 20px;
            }

            .quote-text {
                font-size: 1.3rem;
                line-height: 1.35;
                margin: 20px 0;
            }

            .copyright {
                font-size: 0.85rem;
            }

            .tagline {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="quote-box">
            <p class="quote-text">
                "Uma mulher inspiradora é aquela que carrega no sorriso a prova de que pode vencer qualquer desafio. Você é luz!"
            </p>
        </div>
    </div>

    <footer>
        <p class="copyright">Copyright © Full-Stack Natachi Sayumi</p>
        <p class="tagline">Inspiração que transforma vidas</p>
    </footer>

</body>
</html>
